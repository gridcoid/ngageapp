<!DOCTYPE html>
<html lang="en">
  <head>
    <title>2 Column Ads | n-gage Template</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/gsap.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
      }

      #cta_text,
      p {
        margin-block-start: 0 !important;
      }

      #container {
        position: absolute;
        width: 300px;
        height: 250px;
        overflow: hidden;
        object-fit: cover;
        background-repeat: no-repeat;
        background-size: cover;
      }

      #right_img {
        width: 150px;
        position: absolute;
        top: 0;
        margin: auto;
        height: 100%;
        object-fit: cover;
        background-repeat: no-repeat;
      }

      #logo {
        width: 100px;
        margin-top: 14px;
        margin-left: 10px;
        object-fit: cover;
        height: 35px;
        background-repeat: no-repeat;
      }

      #colright {
        position: absolute;
        top: 0px;
        right: 0px;
        width: 150px;
        height: 250px;
      }

      .overflownone {
        overflow: hidden;
      }

      #headline {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        font-size: 21px;
        color: #e2e1e0;
        top: 57px;
        position: absolute;
        left: 10px;
        width: 130px;
        line-height: 1.3;
        border-bottom: solid 1px;
        padding-bottom: 10px;
      }

      #subline {
        position: absolute;
        top: 130px;
        left: 10px;
        max-width: 130px;
      }

      #cta {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        font-size: 13px;
        background-color: #e68e00;
        padding: 5px 10px;
        color: #fff;
        text-align: center;
        position: absolute;
        bottom: 16px;
        left: 10px;
        max-width: 130px;
        overflow: hidden;
      }

      #shineefct {
        position: absolute;
        left: -49px;
        top: -17px;
        width: 50px;
      }

      p {
        margin-block-end: 0em;
        margin-block-start: 5px;
      }

      #hit {
        position: absolute;
        width: 300px;
        height: 250px;
        z-index: 100;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="colright" class="overflownone">
        <img
          src="https://dev-api.unimind.id/v1/obs?fileKey=defaults/creative_templates/single2col/rightimg.jpg"
          id="right_img"
        />
      </div>
      <div id="colleft">
        <img
          src="https://dev-api.unimind.id/v1/obs?fileKey=defaults/creative_templates/single2col/logo.png"
          id="logo"
        />
        <div id="headline">Staycation at Banten</div>
        <div id="subline">
          <p
            style="
              width: 130px;
              font-size: 10px;
              color: #e2e1e0;
              font-family: Arial, Helvetica, sans-serif;
            "
          >
            Start from
          </p>
          <p
            style="
              width: 130px;
              font-size: 14px;
              font-weight: bold;
              color: #e2e1e0;
              font-family: Arial, Helvetica, sans-serif;
            "
          >
            IDR 350.000<small
              style="
                font-size: 10px;
                font-weight: 100;
                color: #e2e1e0;
                font-family: Arial, Helvetica, sans-serif;
              "
            >
              nett/night</small
            >
          </p>
          <p
            style="
              width: 130px;
              font-size: 10px;
              color: #e2e1e0;
              font-family: Arial, Helvetica, sans-serif;
              opacity: 0.6;
            "
          >
            Free Breakfast<br />Free WiFi
          </p>
        </div>
        <div id="cta">
          <div id="shine">
            <img
              src="https://dev-api.unimind.id/v1/obs?fileKey=defaults/creative_templates/single2col/sine.png"
              id="shineefct"
            />
          </div>
          <span id="cta_text">BOOK NOW</span>
        </div>
      </div>
      <div id="hit"></div>
    </div>
    <input
      type="hidden"
      id="url"
      value="https://www.mysantika.com/our-destinations/jawa-timur"
    />
  </body>
  <script>
    let urllink = document.getElementById('url').value
    let animateloop = 2

    init()
    function init() {
      TweenLite.to(logo, 0, { scale: 0.5, opacity: 0, ease: Expo.SineInOut })
      TweenLite.to(headline, 0, { y: -10, opacity: 0, ease: Expo.SineInOut })
      TweenLite.to(subline, 0, { y: -10, opacity: 0, ease: Expo.SineInOut })
      TweenLite.to(cta, 0, { y: -10, opacity: 0, ease: Expo.SineInOut })
      TweenLite.to(shineefct, 0, { x: 0, ease: Expo.SineOut })
      TweenLite.to(right_img, 0, {
        scale: 1.5,
        ease: Expo.SineOut,
        onComplete: frame2,
      })
    }

    hit.addEventListener('click', gotoURL)

    function frame2() {
      TweenLite.to(logo, 0.5, { scale: 1, opacity: 1, ease: Expo.SineOut })
      TweenLite.to(headline, 0.5, {
        y: 0,
        opacity: 1,
        ease: Expo.SineOut,
        delay: 0.3,
      })
      TweenLite.to(subline, 0.5, {
        y: 0,
        opacity: 1,
        ease: Expo.SineOut,
        delay: 0.5,
      })
      TweenLite.to(cta, 0.5, {
        y: 0,
        opacity: 1,
        ease: Expo.SineOut,
        delay: 0.9,
        onComplete: () => {
          TweenLite.to(shineefct, 3, { x: 200, ease: Expo.SineOut })
          TweenLite.to(shineefct, 0, { x: 0, ease: Expo.SineOut, delay: 3.1 })
          TweenLite.to(shineefct, 3, {
            x: 200,
            ease: Expo.SineOut,
            delay: 3.5,
            onComplete: () => {
              if (animateloop >= 1) {
                init()
                animateloop--
              }
            },
          })
        },
      })
      TweenLite.to(right_img, 4, { scale: 0.99, ease: Expo.SineOut })
    }

    function gotoURL() {
      window.open(urllink, '_BLANK')
    }

    function displayMessage(evt) {
      var message
      var origins = 'http://localhost:3000'
      // if (!origins.includes(evt.origin)) {
      //   message = "check origin domain";
      // } else {
      message = evt.data
      // }

      document.getElementById('headline').innerHTML = message[5].default
      document.getElementById('subline').innerHTML = message[2].default
      document.getElementById('logo').src = message[1].default
      document.getElementById('right_img').src = message[6].default
      document
        .getElementById('container')
        .setAttribute(
          'style',
          message[3].default +
            ";background-image:url('" +
            message[4].default +
            "')"
        )
      document.getElementById('cta_text').innerHTML = message[0].default.text
      document
        .getElementById('cta')
        .setAttribute('style', message[0].default.bg_color)

      init()
    }

    if (window.addEventListener) {
      // For standards-compliant web browsers
      window.addEventListener('message', displayMessage, false)
    } else {
      window.attachEvent('onmessage', displayMessage)
    }
  </script>
</html>
